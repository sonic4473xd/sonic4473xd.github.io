<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsgram Test Mini App</title>
    <!-- Подключаем скрипт Adsgram (ОБЯЗАТЕЛЬНО) -->
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <!-- Подключаем React и Tailwind для работы прямо в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [balance, setBalance] = useState(0);
            const [status, setStatus] = useState('ready'); // ready, loading

            const handleWatchAd = () => {
                // Проверка на наличие Adsgram (работает в ТГ)
                if (!window.Adsgram) {
                    alert("SDK Adsgram не найден. Если вы в браузере, реклама не загрузится. Откройте через Telegram.");
                    return;
                }

                const AdController = window.Adsgram.init({ blockId: "430" });
                
                setStatus('loading');
                
                AdController.show()
                    .then((result) => {
                        setBalance(prev => prev + 50);
                        setStatus('ready');
                        alert("Успешно! +50 кредитов");
                    })
                    .catch((result) => {
                        console.error('Ошибка или пропуск:', result);
                        setStatus('ready');
                        alert("Реклама не досмотрена или ошибка блока 430");
                    });
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="w-full max-w-sm bg-slate-800 border border-slate-700 rounded-[2.5rem] p-8 text-center shadow-2xl">
                        <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                        </div>
                        
                        <h1 className="text-2xl font-black mb-2 tracking-tight">ADSGRAM TEST</h1>
                        <p className="text-slate-400 text-xs mb-8 uppercase tracking-widest font-bold">Блок ID: 430</p>

                        <div className="mb-10">
                            <p className="text-slate-500 text-[10px] font-black uppercase mb-1">Баланс</p>
                            <div className="text-6xl font-black">{balance}</div>
                        </div>

                        <button 
                            onClick={handleWatchAd}
                            disabled={status === 'loading'}
                            className={`w-full py-5 rounded-2xl font-black text-lg transition-all active:scale-95 ${
                                status === 'loading' 
                                ? 'bg-slate-700 text-slate-500' 
                                : 'bg-white text-black shadow-xl'
                            }`}
                        >
                            {status === 'loading' ? 'ЗАГРУЗКА...' : 'СМОТРЕТЬ РЕКЛАМУ'}
                        </button>

                        <p className="mt-6 text-[10px] text-slate-500 font-bold uppercase italic">
                            Работает только внутри Telegram
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
