<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adsgram Debugger</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <div class="flex flex-col h-screen p-4">
        <!-- Статус бар -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4 shadow-lg">
            <h1 class="text-blue-400 font-black text-center uppercase tracking-tighter text-xl">Adsgram Live Test</h1>
            <p class="text-[10px] text-slate-500 text-center font-bold">ID: 430 (Standard Test Block)</p>
        </div>

        <!-- Кнопка запуска -->
        <button id="adBtn" class="bg-white text-black font-black py-5 rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95 transition-all mb-4 text-lg">
            ЗАПУСТИТЬ РЕКЛАМУ
        </button>

        <!-- Лог событий -->
        <div class="flex-1 bg-black border border-slate-800 rounded-2xl p-4 overflow-y-auto font-mono text-[10px]">
            <div class="text-slate-500 mb-2 border-b border-slate-800 pb-1 italic">Системные логи:</div>
            <div id="logContent" class="space-y-1"></div>
        </div>

        <!-- Кнопка очистки -->
        <button onclick="document.getElementById('logContent').innerHTML = ''" class="mt-4 text-[10px] text-slate-600 font-bold uppercase underline">
            Очистить логи
        </button>
    </div>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.ready();
        
        const logContent = document.getElementById('logContent');
        const btn = document.getElementById('adBtn');

        function addLog(text, color = 'text-slate-300') {
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.className = color;
            entry.innerHTML = `<span class="text-slate-600">[${time}]</span> ${text}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        addLog("Приложение запущено", "text-blue-400");
        addLog("Platform: " + webapp.platform);

        if (!window.Adsgram) {
            addLog("КРИТИЧЕСКАЯ ОШИБКА: SDK Adsgram не загружен!", "text-red-500");
        } else {
            addLog("SDK Adsgram успешно загружен", "text-emerald-500");
        }

        // Инициализация
        const AdController = window.Adsgram.init({ blockId: "430" });

        btn.onclick = () => {
            addLog("Нажата кнопка запуска...", "text-yellow-400");
            btn.disabled = true;
            btn.innerText = "ЗАГРУЗКА...";
            btn.style.opacity = "0.5";

            addLog("Вызов AdController.show()...");

            AdController.show()
                .then((result) => {
                    addLog("РЕЗУЛЬТАТ: Успешный показ!", "text-emerald-400 font-bold");
                    addLog("Данные: " + JSON.stringify(result));
                    webapp.HapticFeedback.notificationOccurred('success');
                })
                .catch((error) => {
                    addLog("ОШИБКА ПОКАЗА!", "text-red-400 font-bold");
                    addLog("Детали: " + JSON.stringify(error));
                    
                    if (error.error === "No ads") {
                        addLog("Подсказка: В вашем регионе сейчас нет доступной рекламы.", "text-orange-400");
                    } else if (error.error === "Invalid block") {
                        addLog("Подсказка: Блок 430 отклонен. Нужен личный ID.", "text-orange-400");
                    }
                    
                    webapp.HapticFeedback.notificationOccurred('error');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = "ЗАПУСТИТЬ РЕКЛАМУ";
                    btn.style.opacity = "1";
                    addLog("Процесс завершен", "text-slate-500");
                });
        };
    </script>
</body>
</html>
