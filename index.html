<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsgram Test</title>
    <!-- 1. Скрипт ТГ (важно для инициализации) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 2. Скрипт Рекламы -->
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

    <div class="text-center p-10 bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 w-80">
        <h1 class="text-xl font-bold mb-4">Тест Рекламы</h1>
        <p class="text-slate-400 text-sm mb-6">Block ID: 430 (Test)</p>
        
        <button id="adBtn" class="bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all w-full py-4 rounded-xl font-bold shadow-lg">
            ПОКАЗАТЬ ТЕСТ
        </button>

        <div id="status" class="mt-6 text-xs font-mono text-slate-500 break-all">
            Ожидание нажатия...
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const webapp = window.Telegram.WebApp;
        webapp.ready();
        webapp.expand();

        const btn = document.getElementById('adBtn');
        const statusDiv = document.getElementById('status');

        // Настройка контроллера Adsgram
        // blockId 430 предназначен специально для тестов
        const AdController = window.Adsgram.init({ blockId: "430" });

        btn.onclick = () => {
            statusDiv.innerText = "Загрузка...";
            statusDiv.style.color = "#94a3b8";

            AdController.show()
                .then((result) => {
                    // Реклама успешно показана
                    statusDiv.innerText = "УСПЕХ: Реклама завершена";
                    statusDiv.style.color = "#4ade80";
                    console.log("Done:", result);
                })
                .catch((error) => {
                    // Ошибка показа (или закрыли)
                    statusDiv.innerText = "ОШИБКА: " + JSON.stringify(error);
                    statusDiv.style.color = "#f87171";
                    console.error("Error:", error);
                });
        };
    </script>
</body>
</html>
