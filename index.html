<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adsgram Anti-Block Final</title>
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <div class="flex flex-col h-screen p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 mb-4 shadow-xl">
            <h1 class="text-blue-500 font-black text-center uppercase tracking-tighter text-2xl">Adsgram Fix v3</h1>
            <div id="sdkStatus" class="text-[10px] text-center font-bold mt-2 px-3 py-1 rounded-full bg-red-500/10 text-red-500 inline-block mx-auto w-full">
                SDK НЕ ЗАГРУЖЕН
            </div>
        </div>

        <div class="space-y-3 mb-4">
            <input id="blockIdInput" type="text" value="430" placeholder="Введите Block ID" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors text-white" />
            
            <button id="adBtn" disabled class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all text-xl disabled:bg-slate-800 disabled:text-slate-600">
                ПРОВЕРИТЬ РЕКЛАМУ
            </button>
        </div>

        <!-- Блок логов -->
        <div class="flex-1 bg-black border border-slate-800 rounded-2xl p-4 overflow-y-auto font-mono text-[10px] relative">
            <div id="logContent" class="space-y-1"></div>
        </div>

        <div class="mt-4 grid grid-cols-2 gap-2">
            <button onclick="forceAlternativeLoad()" class="py-3 bg-indigo-600/20 border border-indigo-600/40 text-indigo-400 rounded-xl text-[10px] font-bold uppercase">
                Резервный метод
            </button>
            <button onclick="location.reload()" class="py-3 bg-slate-800 rounded-xl text-[10px] font-bold uppercase">
                Обновить
            </button>
        </div>
    </div>

    <script>
        const logContent = document.getElementById('logContent');
        const sdkStatusLabel = document.getElementById('sdkStatus');
        const btn = document.getElementById('adBtn');
        const blockInput = document.getElementById('blockIdInput');

        function addLog(text, color = 'text-slate-300') {
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.className = color;
            entry.innerHTML = `<span class="text-slate-600">[${time}]</span> ${text}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function setSDKReady(method) {
            addLog(`Adsgram SDK: ПОДКЛЮЧЕН (${method})`, "text-emerald-400");
            sdkStatusLabel.innerText = "SDK ГОТОВ";
            sdkStatusLabel.classList.replace('text-red-500', 'text-emerald-500');
            sdkStatusLabel.classList.replace('bg-red-500/10', 'bg-emerald-500/10');
            btn.disabled = false;
        }

        // Попытка инъекции кода скрипта
        function injectScript(code) {
            try {
                const script = document.createElement('script');
                script.text = code;
                document.head.appendChild(script);
                if (window.Adsgram) {
                    setSDKReady("Injection");
                    return true;
                }
            } catch (e) {
                addLog("Ошибка инъекции: " + e.message, "text-red-500");
            }
            return false;
        }

        // Каскадная загрузка
        async function startLoading() {
            addLog("Запуск каскадной загрузки...");

            // 1. Прямая попытка
            const script = document.createElement('script');
            script.src = "https://adsgram.ai/sdk/v1/adsgram-sdk.js";
            script.onload = () => setSDKReady("Direct");
            script.onerror = async () => {
                addLog("Прямая загрузка не удалась.", "text-orange-400");
                await forceAlternativeLoad();
            };
            document.head.appendChild(script);
        }

        async function forceAlternativeLoad() {
            addLog("Попытка через альтернативные прокси...");
            
            // Список прокси для обхода
            const proxies = [
                (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                (url) => `https://thingproxy.freeboard.io/fetch/${url}`
            ];

            const target = "https://adsgram.ai/sdk/v1/adsgram-sdk.js";

            for (let i = 0; i < proxies.length; i++) {
                const proxyUrl = proxies[i](target);
                addLog(`Пробуем прокси #${i+1}...`);
                
                try {
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error("Status " + response.status);
                    
                    let code;
                    if (proxyUrl.includes('allorigins')) {
                        const data = await response.json();
                        code = data.contents;
                    } else {
                        code = await response.text();
                    }

                    if (code && injectScript(code)) return;
                } catch (e) {
                    addLog(`Прокси #${i+1} не сработал: ${e.message}`, "text-red-400");
                }
            }

            addLog("ВСЕ МЕТОДЫ ИСЧЕРПАНЫ. SDK заблокирован.", "text-red-600 font-bold");
        }

        window.onload = () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                addLog("Telegram WebApp: " + window.Telegram.WebApp.platform);
            }
            startLoading();
        };

        btn.onclick = () => {
            const blockId = blockInput.value.trim() || "430";
            addLog(`Вызов рекламы (Block: ${blockId})...`, "text-blue-400");
            
            const AdController = window.Adsgram.init({ blockId: blockId });
            btn.disabled = true;

            AdController.show()
                .then((res) => {
                    addLog("УСПЕХ: Просмотрено", "text-emerald-400");
                })
                .catch((err) => {
                    addLog("ОШИБКА: " + JSON.stringify(err), "text-red-400");
                })
                .finally(() => {
                    btn.disabled = false;
                });
        };
    </script>
</body>
</html>
