<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adsgram Anti-Block Fix</title>
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <div class="flex flex-col h-screen p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 mb-4 shadow-xl">
            <h1 class="text-blue-500 font-black text-center uppercase tracking-tighter text-2xl">Adsgram Proxy</h1>
            <div id="sdkStatus" class="text-[10px] text-center font-bold mt-2 px-3 py-1 rounded-full bg-red-500/10 text-red-500 inline-block mx-auto w-full">
                SDK НЕ ЗАГРУЖЕН
            </div>
        </div>

        <div class="space-y-3 mb-4">
            <input id="blockIdInput" type="text" value="430" placeholder="Введите Block ID" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" />
            
            <button id="adBtn" disabled class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all text-xl disabled:bg-slate-800 disabled:text-slate-600">
                ПРОВЕРИТЬ РЕКЛАМУ
            </button>
        </div>

        <!-- Блок логов -->
        <div class="flex-1 bg-black border border-slate-800 rounded-2xl p-4 overflow-y-auto font-mono text-[10px] relative">
            <div id="logContent" class="space-y-1"></div>
        </div>

        <div class="mt-4 grid grid-cols-2 gap-2">
            <button onclick="tryAlternativeLoad()" class="py-3 bg-amber-600/20 border border-amber-600/40 text-amber-500 rounded-xl text-[10px] font-bold uppercase">
                Обход блокировки
            </button>
            <button onclick="location.reload()" class="py-3 bg-slate-800 rounded-xl text-[10px] font-bold uppercase">
                Перезагрузить
            </button>
        </div>
    </div>

    <script>
        const logContent = document.getElementById('logContent');
        const sdkStatusLabel = document.getElementById('sdkStatus');
        const btn = document.getElementById('adBtn');
        const blockInput = document.getElementById('blockIdInput');

        function addLog(text, color = 'text-slate-300') {
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.className = color;
            entry.innerHTML = `<span class="text-slate-600">[${time}]</span> ${text}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function setSDKReady() {
            addLog("Adsgram SDK: ПОДКЛЮЧЕН", "text-emerald-400");
            sdkStatusLabel.innerText = "SDK ГОТОВ";
            sdkStatusLabel.classList.replace('text-red-500', 'text-emerald-500');
            sdkStatusLabel.classList.replace('bg-red-500/10', 'bg-emerald-500/10');
            btn.disabled = false;
        }

        // План А: Обычная загрузка
        function loadMain() {
            addLog("Попытка загрузки напрямую...");
            const script = document.createElement('script');
            script.src = "https://adsgram.ai/sdk/v1/adsgram-sdk.js";
            script.onload = setSDKReady;
            script.onerror = () => {
                addLog("Прямая загрузка не удалась.", "text-red-400");
                tryAlternativeLoad();
            };
            document.head.appendChild(script);
        }

        // План Б: Загрузка через прокси-сервер (AllOrigins)
        async function tryAlternativeLoad() {
            addLog("Запуск обхода блокировки через прокси...");
            const targetUrl = encodeURIComponent("https://adsgram.ai/sdk/v1/adsgram-sdk.js");
            const proxyUrl = `https://api.allorigins.win/get?url=${targetUrl}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                if (data.contents) {
                    addLog("Скрипт получен через прокси. Инъекция...");
                    const script = document.createElement('script');
                    script.text = data.contents;
                    document.head.appendChild(script);
                    
                    // Небольшая задержка, чтобы скрипт успел выполниться
                    setTimeout(() => {
                        if (window.Adsgram) {
                            setSDKReady();
                        } else {
                            addLog("Ошибка: Скрипт вставлен, но window.Adsgram не найден.", "text-red-500");
                        }
                    }, 500);
                }
            } catch (e) {
                addLog("Обход блокировки не сработал: " + e.message, "text-red-500");
            }
        }

        window.onload = () => {
            addLog("Приложение запущено");
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                addLog("Telegram WebApp: " + window.Telegram.WebApp.platform);
            }
            loadMain();
        };

        btn.onclick = () => {
            const blockId = blockInput.value.trim() || "430";
            addLog(`Запуск рекламы (Block: ${blockId})...`, "text-blue-400");
            
            const AdController = window.Adsgram.init({ blockId: blockId });
            
            btn.disabled = true;
            btn.innerText = "ЗАГРУЗКА...";

            AdController.show()
                .then((res) => {
                    addLog("УСПЕХ: Просмотр завершен", "text-emerald-400 font-bold");
                })
                .catch((err) => {
                    addLog("ОТКЛОНЕНО: " + JSON.stringify(err), "text-red-400");
                    if (err.error === "No ads") {
                        addLog("Примечание: Рекламы нет для вашего региона.", "text-amber-400");
                    }
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = "ПРОВЕРИТЬ РЕКЛАМУ";
                });
        };
    </script>
</body>
</html>
