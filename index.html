<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adsgram Fix</title>
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Основной скрипт Adsgram (пробуем загрузить) -->
    <script id="adsgram-script" src="https://adsgram.ai/sdk/v1/adsgram-sdk.js" onerror="handleScriptError()"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <div class="flex flex-col h-screen p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 mb-4 shadow-xl">
            <h1 class="text-blue-500 font-black text-center uppercase tracking-tighter text-2xl">Adsgram Loader</h1>
            <div id="sdkStatus" class="text-[10px] text-center font-bold mt-2 px-3 py-1 rounded-full bg-yellow-500/10 text-yellow-500 inline-block mx-auto w-full">
                ПРОВЕРКА СОЕДИНЕНИЯ...
            </div>
        </div>

        <button id="adBtn" class="bg-blue-600 text-white font-black py-6 rounded-2xl shadow-lg active:scale-95 transition-all mb-4 text-xl disabled:bg-slate-800 disabled:text-slate-600">
            ПРОВЕРИТЬ РЕКЛАМУ
        </button>

        <!-- Блок логов -->
        <div class="flex-1 bg-black border border-slate-800 rounded-2xl p-4 overflow-y-auto font-mono text-[10px] relative">
            <div id="logContent" class="space-y-1"></div>
            <button onclick="location.reload()" class="absolute top-2 right-2 bg-slate-800 px-2 py-1 rounded text-[8px] uppercase">Обновить страницу</button>
        </div>

        <div id="retryArea" class="hidden mt-4">
            <button onclick="retryLoadSDK()" class="w-full py-3 bg-amber-600 rounded-xl text-xs font-bold uppercase">
                Повторить загрузку скрипта
            </button>
        </div>
    </div>

    <script>
        const logContent = document.getElementById('logContent');
        const sdkStatusLabel = document.getElementById('sdkStatus');
        const btn = document.getElementById('adBtn');
        const retryArea = document.getElementById('retryArea');

        function addLog(text, color = 'text-slate-300') {
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.className = color;
            entry.innerHTML = `<span class="text-slate-600">[${time}]</span> ${text}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function handleScriptError() {
            addLog("ОШИБКА: Не удалось загрузить скрипт с adsgram.ai", "text-red-500");
            sdkStatusLabel.innerText = "ОШИБКА ЗАГРУЗКИ СКРИПТА";
            sdkStatusLabel.classList.replace('text-yellow-500', 'text-red-500');
            retryArea.classList.remove('hidden');
        }

        function retryLoadSDK() {
            addLog("Повторная попытка загрузки...");
            const oldScript = document.getElementById('adsgram-script');
            if (oldScript) oldScript.remove();
            
            const newScript = document.createElement('script');
            newScript.id = 'adsgram-script';
            newScript.src = "https://adsgram.ai/sdk/v1/adsgram-sdk.js?v=" + Date.now();
            newScript.onload = () => checkSDK();
            newScript.onerror = () => handleScriptError();
            document.head.appendChild(newScript);
        }

        function checkSDK() {
            if (window.Adsgram) {
                addLog("Adsgram SDK: УСПЕШНО ЗАГРУЖЕН", "text-emerald-400");
                sdkStatusLabel.innerText = "SDK ГОТОВ";
                sdkStatusLabel.classList.replace('text-yellow-500', 'text-emerald-500');
                btn.disabled = false;
                retryArea.classList.add('hidden');
            } else {
                handleScriptError();
            }
        }

        window.onload = () => {
            addLog("Приложение запущено");
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                addLog("Telegram WebApp: " + window.Telegram.WebApp.platform, "text-blue-400");
            }
            
            // Небольшая задержка для проверки
            setTimeout(checkSDK, 1000);
        };

        btn.onclick = () => {
            addLog("Запуск блока 430...");
            const AdController = window.Adsgram.init({ blockId: "430" });
            
            btn.disabled = true;
            btn.innerText = "ЗАГРУЗКА...";

            AdController.show()
                .then((res) => {
                    addLog("УСПЕХ: Реклама завершена", "text-emerald-400 font-bold");
                })
                .catch((err) => {
                    addLog("ОТКЛОНЕНО: " + JSON.stringify(err), "text-red-400");
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = "ПРОВЕРИТЬ РЕКЛАМУ";
                });
        };
    </script>
</body>
</html>
